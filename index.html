<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
<meta name="theme-color" content="#0A0B0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grapplers">
<meta name="description" content="A marketplace + record for the grappling community. Verified athletes. Endorsements on file. Privates, seminars, instructionals.">
<title>Grapplers — The coach you can't find is on Grapplers.</title>
<link rel="icon" type="image/png" sizes="64x64" href="grapplers/favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="grapplers/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="grapplers/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="grapplers/apple-touch-icon.png">
<link rel="manifest" href="grapplers/manifest.webmanifest">
<meta property="og:title" content="Grapplers — The coach you can't find is on Grapplers.">
<meta property="og:description" content="A marketplace + record for the grappling community. Verified athletes. Endorsements on file.">
<meta property="og:image" content="grapplers/icon-512.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="grapplers/tokens.css">
<style>
  html, body { height: 100%; overscroll-behavior-y: none; }
  body { background: var(--g-carbon); }

  /* Real-app root. Mobile: fills viewport. Desktop: phone frame on a dark stage beside marketing. */
  #root { min-height: 100vh; min-height: 100dvh; }

  /* Splash shown before React mounts */
  .g-splash {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px;
    background: var(--g-carbon); z-index: 999;
  }
  .g-splash img {
    width: 160px; height: auto; object-fit: contain;
    filter: drop-shadow(0 20px 60px rgba(30,111,255,0.25));
    animation: g-splash-in 700ms cubic-bezier(0.2,0.7,0.2,1) both;
  }
  .g-splash-label {
    color: rgba(255,255,255,0.4);
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.24em; font-size: 11px;
  }
  .g-splash-label::after { content: ' '; animation: g-dotdot 1.2s steps(4, end) infinite; }
  @keyframes g-dotdot { 0%{content:' '} 25%{content:' .'} 50%{content:' ..'} 75%{content:' ...'} 100%{content:' '} }
  @keyframes g-splash-in { from { opacity: 0; transform: translateY(8px) scale(0.97); } to { opacity: 1; transform: none; } }

  /* Full-screen phone (mobile) vs framed phone (desktop) — handled in JS via ResponsivePhone */
  .gx-stage {
    min-height: 100vh; min-height: 100dvh;
    background: var(--g-carbon);
  }

  /* Toast */
  .g-toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(20,22,26,0.96); color: var(--g-fg-1);
    border: 1px solid var(--g-border-strong); border-radius: 10px;
    padding: 10px 16px; font-size: 13px; font-family: var(--g-sans);
    box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    z-index: 200; max-width: 88%; text-align: center;
    animation: g-toast 2.2s ease both;
    backdrop-filter: blur(14px);
  }
  @keyframes g-toast {
    0%   { opacity: 0; transform: translate(-50%, 20px); }
    10%  { opacity: 1; transform: translate(-50%, 0); }
    85%  { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, 10px); }
  }

  /* Button tap feedback */
  button { font-family: inherit; }
  button:active { transform: scale(0.985); }
</style>
</head>
<body>

<div id="root"><div class="g-splash"><img src="grapplers/icon-512.png" alt="Grapplers"><div class="g-splash-label">LOADING</div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="grapplers/data.js"></script>
<script type="text/babel" src="grapplers/components.jsx"></script>
<script type="text/babel" src="grapplers/shell.jsx"></script>
<script type="text/babel" src="grapplers/screens/Feed.jsx"></script>
<script type="text/babel" src="grapplers/screens/Profile.jsx"></script>
<script type="text/babel" src="grapplers/screens/Instructional.jsx"></script>
<script type="text/babel" src="grapplers/screens/Other.jsx"></script>
<script type="text/babel" src="grapplers/screens/AthleteHome.jsx"></script>
<script type="text/babel" src="grapplers/App.jsx"></script>
<script type="text/babel" src="grapplers/Marketing.jsx"></script>
<script type="text/babel" src="grapplers/AppRoot.jsx"></script>

<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot />);
</script>
</body>
</html>
