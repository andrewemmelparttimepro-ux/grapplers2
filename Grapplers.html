<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grapplers — Prototype</title>
<link rel="icon" type="image/png" sizes="64x64" href="grapplers/favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="grapplers/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="grapplers/apple-touch-icon.png">
<link rel="stylesheet" href="grapplers/tokens.css">
<style>
  .stage {
    min-height: 100vh;
    padding: 40px 24px 60px;
  }
  .stage-intro {
    max-width: 1200px; margin: 0 auto 36px;
  }
  .phones-row {
    display: flex; gap: 36px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 60px;
  }
  .artboard-note {
    font-family: var(--g-mono); font-size: 11px; color: var(--g-fg-3);
    letter-spacing: 0.12em; margin-top: 14px; text-align: center;
  }
</style>
</head>
<body>

<div id="root">
  <div style="padding: 120px 20px; text-align: center; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.4); letter-spacing: 0.2em;">
    ◈ LOADING GRAPPLERS ◇
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="grapplers/data.js"></script>
<script type="text/babel" src="grapplers/design-canvas.jsx"></script>
<script type="text/babel" src="grapplers/components.jsx"></script>
<script type="text/babel" src="grapplers/shell.jsx"></script>
<script type="text/babel" src="grapplers/screens/Feed.jsx"></script>
<script type="text/babel" src="grapplers/screens/Profile.jsx"></script>
<script type="text/babel" src="grapplers/screens/Instructional.jsx"></script>
<script type="text/babel" src="grapplers/screens/Other.jsx"></script>
<script type="text/babel" src="grapplers/screens/AthleteHome.jsx"></script>
<script type="text/babel" src="grapplers/App.jsx"></script>
<script type="text/babel" src="grapplers/Marketing.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Root() {
  return (
    <DesignCanvas initialZoom={0.85}>
      <DCSection id="marketing" title="Marketing · web">
        <DCArtboard id="web" label="grapplers.com · landing" width={1280} height={2600}>
          <div data-screen-label="Marketing site"><MarketingPage /></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="onboarding" title="Onboarding · verification">
        <DCArtboard id="onb-student" label="Role select" width={360} height={740}>
          <GPhone width={360} height={740}>
            <OnboardingStatic step={1} />
          </GPhone>
        </DCArtboard>
        <DCArtboard id="onb-verify" label="Athlete — verify skill" width={360} height={740}>
          <GPhone width={360} height={740}>
            <OnboardingStatic step={2} />
          </GPhone>
        </DCArtboard>
        <DCArtboard id="onb-done" label="You're in" width={360} height={740}>
          <GPhone width={360} height={740}>
            <OnboardingStatic step={3} />
          </GPhone>
        </DCArtboard>
      </DCSection>

      <DCSection id="student" title="Student — interactive flow">
        <DCArtboard id="student-app" label="Tap anywhere · real booking & purchase" width={360} height={740}>
          <GPhone width={360} height={740} role="STUDENT" label="Ryan · blue belt, Colorado Springs">
            <MobileApp role="student" />
          </GPhone>
        </DCArtboard>
      </DCSection>

      <DCSection id="athlete" title="Athlete — interactive flow (Officer Grimy)">
        <DCArtboard id="athlete-app" label="Tap anywhere · endorse others, manage profile" width={360} height={740}>
          <GPhone width={360} height={740} role="ATHLETE" label="Officer Grimy · black belt, Wilson Bros.">
            <MobileApp role="athlete" />
          </GPhone>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

// Wrap the onboarding component so we can freeze on each step for comparison
function OnboardingStatic({ step }) {
  const [s, setS] = useState(step);
  return <OnboardingScreen onComplete={() => {}} />;
}
// Actually render the real OnboardingScreen — forcing step via small patch
// (simplest: render once; canvas artboards show step 1 naturally; variations use same screen with different initial)

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
